const container = document.getElementById("quiz");
function showModule(index) {
    container.innerHTML = "";

    // switch active tab
    document.querySelectorAll(".tab").forEach((t,i)=>{
        t.classList.toggle("active", i === index);
    });

    const mod = data[index];

    let modTitle = document.createElement("div");
    modTitle.className = "module-title";
    modTitle.innerText = mod.module;
    container.appendChild(modTitle);

    mod.questions.forEach(q => {
        let div = document.createElement("div");
        div.className = "question";

        let title = document.createElement("div");
        title.innerText = q.q;
        div.appendChild(title);

        q.options.forEach(opt => {
            let btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = opt;

           btn.onclick = () => {

    // Remove previous colors from all options
    div.querySelectorAll(".option").forEach(option => {
        option.classList.remove("correct", "wrong");
    });

    // Remove old answer text if already shown
    let oldAnswer = div.querySelector(".answer");
    if (oldAnswer) {
        oldAnswer.remove();
    }

    // Check selected answer
    if (opt === q.answer) {
        btn.classList.add("correct");
    } else {
        btn.classList.add("wrong");

        let ans = document.createElement("div");
        ans.className = "answer";
        ans.innerText = "Correct Answer: " + q.answer;
        div.appendChild(ans);
    }
};
            div.appendChild(btn);
        });

        container.appendChild(div);
    });
}

// load first module automatically
